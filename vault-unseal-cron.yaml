---
apiVersion: v1
kind: Secret
metadata:
  name: "vault-unseal-keys"
type: Opaque
#
# This secret will be populated by the initialization script with
# the unseal keys, as well as the root token.
#
stringData: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "vault-init-scripts"
#
# You can add initialization scripts into this secret (example
# below), so they can be executed when the Vault cluster is
# first initialized ... and ONLY then.
#
data:
  # Example Script
  00-some-script:
    #!/bin/bash
    # do-some-vault-initialization
    # can use the vault-* scripts, or directly call vault
    # VAULT_ADDR and VAULT_TOKEN will already have been set
    exit 0
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: "vault-unseal"
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: "vault-unseal-init"
rules:
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    resourceNames: [ "vault-unseal-keys" ]
    verbs: [ "*" ]
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "list" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "vault-unseal"
subjects:
  - kind: ServiceAccount
    name: "vault-unseal"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "vault-unseal-init"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: &name "vault-unseal"
spec:
  # Default schedule every minute
  # Adjust as desired
  schedule: "0-59 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  suspend: false
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccount: *name
          containers:
            - name: *name
              image: public.ecr.aws/arkcase/vault:latest
              imagePullPolicy: Always
              command: [ "/unseal-entrypoint" ]
              env:
                - name: VAULT_NAMESPACE
                  valueFrom:
                    fieldRef:
                      apiVersion: v1
                      fieldPath: metadata.namespace
                - name: VAULT_SCHEME
                  value: "http"
                - name: VAULT_SERVICE
                  value: "vault"
                - name: VAULT_PORT
                  value: "8200"
                - name: VAULT_SELECTOR
                  value: "app.kubernetes.io/instance=vault,app.kubernetes.io/name=vault,component=server"
                - name: SECRET_NAME
                  value: &secret-keys "vault-unseal-keys"
                - name: INIT_DIR
                  value: &init-dir "/vault-init.d"
                - name: UNSEAL_KEYS_DIR
                  value: &unseal-dir "/vault-unseal.d"
              volumeMounts:
                - name: &init-scripts-vol "init-scripts"
                  mountPath: "/vault-init.d/scripts"
                  readOnly: true
                - name: &unseal-keys-vol "unseal-keys"
                  mountPath: *unseal-dir
                  readOnly: true
          volumes:
            - name: *unseal-keys-vol
              secret:
                secretName: *secret-keys
                defaultMode: 0444
            - name: *init-scripts-vol
              configMap:
                name: "vault-init-scripts"
                defaultMode: 0755
          restartPolicy: OnFailure
